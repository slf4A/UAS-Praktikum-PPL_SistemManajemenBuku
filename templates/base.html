<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}E-Perpus{% endblock %}</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Design Tokens ── */
    :root {
      --c-primary:      #2563EB;
      --c-primary-dark: #1D4ED8;
      --c-primary-soft: #EFF6FF;
      --c-accent:       #F59E0B;
      --c-success:      #16A34A;
      --c-danger:       #DC2626;
      --c-surface:      #FFFFFF;
      --c-bg:           #F8FAFC;
      --c-border:       #E2E8F0;
      --c-text:         #0F172A;
      --c-text-muted:   #64748B;
      --radius-sm:      6px;
      --radius-md:      10px;
      --radius-lg:      16px;
      --shadow-sm:      0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
      --shadow-md:      0 4px 12px rgba(0,0,0,.08), 0 2px 4px rgba(0,0,0,.04);
      --shadow-lg:      0 10px 30px rgba(0,0,0,.10);
    }

    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--c-bg);
      color: var(--c-text);
      font-size: .9375rem;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }
    a { color: var(--c-primary); text-decoration: none; }
    a:hover { color: var(--c-primary-dark); }
    img { max-width: 100%; display: block; }

    /* ── Navbar ── */
    .site-nav {
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      padding: .75rem 0;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow-sm);
    }
    .site-nav .navbar-brand {
      font-weight: 700;
      font-size: 1.125rem;
      color: var(--c-primary) !important;
      display: flex;
      align-items: center;
      gap: .45rem;
      letter-spacing: -.3px;
    }
    .site-nav .nav-link {
      font-size: .875rem;
      font-weight: 500;
      color: var(--c-text-muted) !important;
      padding: .4rem .75rem !important;
      border-radius: var(--radius-sm);
      transition: color .15s, background .15s;
    }
    .site-nav .nav-link:hover,
    .site-nav .nav-link.active {
      color: var(--c-primary) !important;
      background: var(--c-primary-soft);
    }
    .nav-btn {
      background: var(--c-primary);
      color: #fff !important;
      padding: .4rem 1rem !important;
      border-radius: var(--radius-sm);
      font-size: .875rem;
      font-weight: 600;
      transition: background .15s, transform .1s;
    }
    .nav-btn:hover {
      background: var(--c-primary-dark) !important;
      color: #fff !important;
      transform: translateY(-1px);
    }

    /* ── Page Header ── */
    .page-header {
      background: var(--c-surface);
      border-bottom: 1px solid var(--c-border);
      padding: 2rem 0 1.75rem;
    }
    .page-header h1 {
      font-size: 1.6rem;
      font-weight: 700;
      letter-spacing: -.4px;
      margin: 0;
      color: var(--c-text);
    }
    .page-header p {
      margin: .35rem 0 0;
      font-size: .875rem;
      color: var(--c-text-muted);
    }

    /* ── Cards ── */
    .card {
      border: 1px solid var(--c-border) !important;
      border-radius: var(--radius-lg) !important;
      box-shadow: var(--shadow-sm) !important;
      background: var(--c-surface);
      transition: box-shadow .2s, transform .2s;
    }
    .card:hover { box-shadow: var(--shadow-md) !important; }

    .book-card { overflow: hidden; }
    .book-card .book-thumb {
      height: 200px;
      object-fit: cover;
      width: 100%;
      background: var(--c-primary-soft);
    }
    .book-thumb-placeholder {
      height: 200px;
      background: linear-gradient(135deg, var(--c-primary-soft), #DBEAFE);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #93C5FD;
      gap: .5rem;
    }
    .book-thumb-placeholder i { font-size: 2.75rem; }
    .book-thumb-placeholder span { font-size: .75rem; font-weight: 500; }

    .book-card .card-body { padding: 1rem 1.125rem 1.125rem; }
    .book-card .card-title {
      font-size: .9375rem;
      font-weight: 600;
      margin-bottom: .25rem;
      color: var(--c-text);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .book-card .card-text { font-size: .8125rem; color: var(--c-text-muted); margin-bottom: .625rem; }

    /* ── Badges ── */
    .badge-cat {
      display: inline-block;
      background: var(--c-primary-soft);
      color: var(--c-primary);
      border-radius: 20px;
      padding: .2rem .65rem;
      font-size: .7rem;
      font-weight: 600;
      letter-spacing: .2px;
      margin-bottom: .5rem;
    }
    .badge-stok-ok {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .8rem;
      font-weight: 600;
      color: var(--c-success);
    }
    .badge-stok-habis {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      font-size: .8rem;
      font-weight: 600;
      color: var(--c-danger);
    }

    /* ── Buttons ── */
    .btn { font-size: .875rem; font-weight: 500; border-radius: var(--radius-sm); transition: all .15s; }
    .btn-primary {
      background: var(--c-primary);
      border-color: var(--c-primary);
    }
    .btn-primary:hover {
      background: var(--c-primary-dark);
      border-color: var(--c-primary-dark);
      transform: translateY(-1px);
      box-shadow: 0 4px 10px rgba(37,99,235,.3);
    }
    .btn-success:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(22,163,74,.3); }
    .btn-outline-secondary { border-color: var(--c-border); color: var(--c-text-muted); }
    .btn-outline-secondary:hover { background: var(--c-bg); color: var(--c-text); border-color: #CBD5E1; }

    /* ── Search bar ── */
    .search-wrap {
      background: var(--c-surface);
      border: 1.5px solid var(--c-border);
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      overflow: hidden;
      transition: border-color .15s, box-shadow .15s;
    }
    .search-wrap:focus-within {
      border-color: var(--c-primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .search-wrap .search-icon {
      padding: 0 .75rem;
      color: var(--c-text-muted);
      font-size: 1rem;
    }
    .search-wrap input {
      border: none;
      outline: none;
      flex: 1;
      padding: .65rem .5rem .65rem 0;
      font-size: .9rem;
      background: transparent;
      color: var(--c-text);
    }
    .search-wrap input::placeholder { color: #94A3B8; }
    .search-wrap .btn {
      margin: .3rem;
      border-radius: var(--radius-sm);
      padding: .45rem 1.1rem;
      font-size: .85rem;
    }

    /* ── Forms ── */
    .form-control, .form-select {
      border: 1.5px solid var(--c-border);
      border-radius: var(--radius-sm);
      padding: .6rem .85rem;
      font-size: .9rem;
      color: var(--c-text);
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus, .form-select:focus {
      border-color: var(--c-primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,.12);
    }
    .form-label { font-size: .875rem; font-weight: 500; margin-bottom: .4rem; color: var(--c-text); }
    .form-text { font-size: .8rem; color: var(--c-text-muted); }

    /* ── Alert ── */
    .alert { border: none; border-radius: var(--radius-md); font-size: .875rem; padding: .875rem 1.125rem; }

    /* ── Divider ── */
    hr { border-color: var(--c-border); opacity: 1; }

    /* ── Footer ── */
    .site-footer {
      background: var(--c-surface);
      border-top: 1px solid var(--c-border);
      padding: 1.5rem 0;
      margin-top: 5rem;
    }
    .site-footer p { font-size: .8125rem; color: var(--c-text-muted); margin: 0; }

    /* ── Breadcrumb ── */
    .breadcrumb { font-size: .8rem; margin: 0; }
    .breadcrumb-item a { color: var(--c-text-muted); }
    .breadcrumb-item.active { color: var(--c-text); font-weight: 500; }
    .breadcrumb-item + .breadcrumb-item::before { color: #CBD5E1; }

    /* ── Misc ── */
    .empty-state { padding: 4rem 1rem; text-align: center; }
    .empty-state i { font-size: 3rem; color: #CBD5E1; }
    .empty-state p { color: var(--c-text-muted); margin-top: .75rem; font-size: .9375rem; }
    .section-label {
      font-size: .75rem;
      font-weight: 700;
      letter-spacing: .8px;
      text-transform: uppercase;
      color: var(--c-text-muted);
      margin-bottom: 1.25rem;
    }
  </style>
  {% block extra_css %}{% endblock %}
</head>
<body>

<!-- ── Navbar ── -->
<nav class="site-nav">
  <div class="container">
    <nav class="navbar navbar-expand-md p-0">
      <a class="navbar-brand" href="{% url 'index' %}">
        <i class="bi bi-book-half"></i> E-Perpus
      </a>
      <button class="navbar-toggler border-0 p-1" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
        <i class="bi bi-list fs-5" style="color:var(--c-text)"></i>
      </button>
      <div class="collapse navbar-collapse" id="mainNav">
        <ul class="navbar-nav ms-auto align-items-md-center gap-1">
          <li class="nav-item">
            <a class="nav-link {% block nav_beranda %}{% endblock %}" href="{% url 'index' %}">
              <i class="bi bi-house me-1"></i>Beranda
            </a>
          </li>
          <li class="nav-item">
            <a class="nav-link {% block nav_tentang %}{% endblock %}" href="{% url 'tentang' %}">
              <i class="bi bi-info-circle me-1"></i>Tentang
            </a>
          </li>
          <li class="nav-item ms-1">
            <a class="nav-link nav-btn" href="{% url 'index' %}">
              <i class="bi bi-bookmark-plus me-1"></i>Reservasi
            </a>
          </li>
        </ul>
      </div>
    </nav>
  </div>
</nav>

<!-- ── Main ── -->
<main>{% block content %}{% endblock %}</main>

<!-- ── Footer ── -->
<footer class="site-footer">
  <div class="container d-flex flex-column flex-md-row align-items-center justify-content-between gap-2">
    <p>© 2025 <strong>E-Perpus</strong> — Sistem Inventaris &amp; Reservasi Buku</p>
    <p>Dibangun dengan Django &amp; Bootstrap 5</p>
  </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
